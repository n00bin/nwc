<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companions — NWCB</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <nav class="navbar"></nav>

  <!-- Filters / Search -->
  <div class="controls-bar">
    <input type="text" class="search-input" id="search" placeholder="Search companions...">
    <select class="filter-select" id="filter-stat">
      <option value="">All Stats</option>
    </select>
    <select class="filter-select" id="filter-slot">
      <option value="">All Slot Types</option>
    </select>
    <select class="filter-select" id="filter-enhancement">
      <option value="">All Enhancements</option>
    </select>
  </div>

  <!-- Two-panel layout -->
  <div class="page-body">
    <div class="list-panel" id="list-panel">
      <div class="list-count" id="list-count"></div>
      <div id="companion-list"></div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">Select a companion to view details</div>
    </div>
  </div>

  <!-- Data -->
  <script src="data/companions.js"></script>
  <script src="data/companion-powers.js"></script>
  <script src="data/companion-enhancements.js"></script>

  <!-- Scripts -->
  <script src="js/shared.js"></script>
  <script src="js/companions-page.js"></script>
</body>
</html>
