<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companions — Neverwinter Compendium</title>
  <meta name="description" content="Browse all Neverwinter companions with stats, powers, enhancements, summoned buffs, and damage rankings.">
  <meta property="og:title" content="Companions — Neverwinter Compendium">
  <meta property="og:description" content="Browse all Neverwinter companions with stats, powers, enhancements, summoned buffs, and damage rankings.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .enhancement-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border-default); flex-shrink: 0; }
    .companion-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border-default); flex-shrink: 0; }
    .list-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); margin-right: 0.4rem; vertical-align: middle; flex-shrink: 0; }
    .rarity-btn { background: none; border: 1px solid; border-radius: var(--radius-sm); padding: 0.2rem 0.5rem; font-size: 0.75rem; font-family: var(--font-main); cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
    .rarity-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <nav class="navbar"></nav>

  <!-- View tabs -->
  <div class="controls-bar" style="gap:0.25rem;padding-bottom:0;">
    <button class="view-tab active" id="tab-lookup">Lookup</button>
    <button class="view-tab" id="tab-summoned">Summoned Buffs</button>
    <button class="view-tab" id="tab-enhancements">Enhancements</button>
    <button class="view-tab" id="tab-damage">Damage Companions</button>
  </div>

  <!-- Filters / Search (lookup view) -->
  <div class="controls-bar" id="lookup-controls">
    <input type="text" class="search-input" id="search" placeholder="Search companions...">
    <select class="filter-select" id="filter-stat">
      <option value="">All Stats</option>
    </select>
    <select class="filter-select" id="filter-slot">
      <option value="">All Slot Types</option>
    </select>
    <select class="filter-select" id="filter-enhancement">
      <option value="">All Enhancements</option>
    </select>
  </div>

  <!-- Filters (summoned view) -->
  <div class="controls-bar" id="summoned-controls" style="display:none;">
    <input type="text" class="search-input" id="summoned-search" placeholder="Search summoned buffs...">
  </div>

  <div class="controls-bar" id="enhancement-controls" style="display:none;">
    <input type="text" class="search-input" id="enhancement-search" placeholder="Search enhancements...">
  </div>

  <div class="controls-bar" id="damage-controls" style="display:none;">
    <input type="text" class="search-input" id="damage-search" placeholder="Search damage companions...">
    <select class="filter-select" id="filter-damage-cat">
      <option value="">All Categories</option>
      <option value="Outgoing Damage">Outgoing Damage</option>
      <option value="Boss Damage">Boss Damage</option>
      <option value="At-Will Damage">At-Will Damage</option>
      <option value="Power Damage">Power Damage</option>
      <option value="Enemy Type Damage">Enemy Type Damage</option>
      <option value="Damage Proc">Damage Proc</option>
      <option value="Extra Hit">Extra Hit</option>
      <option value="Enemy Debuff">Enemy Debuff</option>
    </select>
  </div>

  <style>
    .view-tab {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-bottom: none;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      color: var(--text-secondary);
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      font-family: var(--font-main);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .view-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .summoned-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summoned-card:hover { border-color: var(--border-accent); }
    .summoned-stat { font-weight: 700; font-family: var(--font-mono); }
    .summoned-group-header {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--highlight);
      padding: 1.25rem 0 0.4rem;
      border-bottom: 1px solid var(--border-default);
      margin-bottom: 0.5rem;
    }
    .summoned-group-header:first-child { padding-top: 0; }
  </style>

  <!-- Two-panel layout (lookup view) -->
  <div class="page-body" id="lookup-view">
    <div class="list-panel" id="list-panel">
      <div class="list-count" id="list-count"></div>
      <div id="companion-list"></div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">Select a companion to view details</div>
    </div>
  </div>

  <!-- Summoned buffs view -->
  <div id="summoned-view" style="display:none; max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem;">
    <div id="summoned-count" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.75rem;"></div>
    <div id="summoned-list"></div>
  </div>

  <!-- Enhancement ranking view -->
  <div id="enhancement-view" style="display:none; max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem;">
    <div id="enhancement-list"></div>
  </div>

  <!-- Damage companions view -->
  <div id="damage-view" style="display:none; max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem;">
    <div id="damage-list"></div>
  </div>

  <!-- Data -->
  <script src="data/companions.js"></script>
  <script src="data/companion-powers.js"></script>
  <script src="data/companion-enhancements.js"></script>
  <script src="data/enhancement-images.js"></script>
  <script src="data/companion-images.js"></script>

  <!-- Scripts -->
  <script src="js/shared.js"></script>
  <script src="js/companions-page.js"></script>
</body>
</html>
