<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professions — Neverwinter Compendium</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .view-tab { background:var(--bg-elevated); border:1px solid var(--border-default); border-bottom:none; border-radius:var(--radius-sm) var(--radius-sm) 0 0; color:var(--text-secondary); padding:0.45rem 1rem; font-size:0.9rem; font-family:var(--font-main); cursor:pointer; transition:background 0.15s,color 0.15s; }
    .view-tab:hover { color:var(--text-primary); background:var(--bg-hover); }
    .view-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .prof-container { max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem; }
    .prof-view { display:none; }
    .prof-view.active { display:block; }
    .prof-card { background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:0.8rem 1rem; margin-bottom:0.5rem; cursor:pointer; }
    .prof-card:hover { border-color:var(--border-accent); }
    .prof-card.open { border-color:var(--accent); }
    .prof-card-header { display:flex; justify-content:space-between; align-items:center; }
    .prof-card-name { font-weight:700; }
    .prof-card-body { display:none; margin-top:0.6rem; }
    .prof-card.open .prof-card-body { display:block; }
    .prof-info { display:flex; justify-content:space-between; padding:0.25rem 0; border-bottom:1px solid var(--border-default); font-size:0.88rem; }
    .prof-info:last-child { border-bottom:none; }
    .prof-label { color:var(--text-secondary); }
    .prof-val { font-weight:600; font-family:var(--font-mono); }
    .section-div { font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--highlight); padding:1rem 0 0.4rem; border-bottom:1px solid var(--border-default); margin-bottom:0.75rem; }
    .section-div:first-child { padding-top:0; }
    .tip-block { background:var(--bg-elevated); border-left:3px solid var(--accent); padding:0.6rem 0.8rem; border-radius:var(--radius-sm); font-size:0.9rem; color:var(--text-secondary); line-height:1.6; margin-bottom:0.75rem; }
    .tip-block strong { color:var(--text-primary); }
    .toggle-arrow { transition:transform 0.2s; font-size:0.8rem; color:var(--text-muted); }
    .prof-card.open .toggle-arrow { transform:rotate(90deg); }
    .mw-table { width:100%; border-collapse:collapse; margin:0.5rem 0; font-size:0.85rem; }
    .mw-table th,.mw-table td { padding:0.35rem 0.5rem; border:1px solid var(--border-default); text-align:left; }
    .mw-table th { background:var(--bg-elevated); color:var(--highlight); font-weight:700; font-size:0.78rem; text-transform:uppercase; }
  </style>
</head>
<body>
  <nav class="navbar"></nav>

  <div class="controls-bar" style="gap:0.25rem;padding-bottom:0;">
    <button class="view-tab active" data-tab="artisans">Artisans</button>
    <button class="view-tab" data-tab="masterwork">Masterwork Guide</button>
    <button class="view-tab" data-tab="profit">Profitable Crafting</button>
    <button class="view-tab" data-tab="workshop">Workshop Upgrades</button>
  </div>

  <!-- Artisans controls -->
  <div class="controls-bar" id="artisans-controls">

    <select class="filter-select" id="filter-prof">

      <option value="Adventurer">Adventurer</option>
      <option value="Alchemist">Alchemist</option>
      <option value="Armorer">Armorer</option>
      <option value="Artificer">Artificer</option>
      <option value="Blacksmith">Blacksmith</option>
      <option value="Jeweler">Jeweler</option>
      <option value="Leatherworker">Leatherworker</option>
      <option value="Tailor">Tailor</option>
    </select>
  </div>

  <!-- Artisans view -->
  <div class="prof-container prof-view active" id="view-artisans">
    <div id="artisan-count" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.75rem;"></div>
    <div id="artisan-list"></div>
  </div>

  <!-- Masterwork view -->
  <div class="prof-container prof-view" id="view-masterwork"><div id="mw-content"></div></div>

  <!-- Profit view -->
  <div class="prof-container prof-view" id="view-profit"><div id="profit-content"></div></div>

  <!-- Workshop view -->
  <div class="prof-container prof-view" id="view-workshop"><div id="workshop-content"></div></div>

    // ============================================================
    // RENDER ARTISANS
    // ============================================================
    var searchInput = document.getElementById("search");
    var filterProf = document.getElementById("filter-prof");

    function renderArtisans() {
      var query = searchInput.value.trim().toLowerCase();
      var profVal = filterProf.value;
      var filtered = artisans.filter(function(a) {
        if (query && (a.name + " " + a.prof + " " + a.special).toLowerCase().indexOf(query) === -1) return false;
        if (profVal && a.prof !== profVal) return false;
        return true;
      });
      document.getElementById("artisan-count").textContent = filtered.length + " of " + artisans.length + " artisans";
      var html = ""; var lastProf = "";
      for (var i = 0; i < filtered.length; i++) {
        var a = filtered[i];
        if (a.prof !== lastProf && !profVal) { html += '<div class="section-div">' + a.prof + 's</div>'; lastProf = a.prof; }
        html += '<div class="prof-card"><div class="prof-card-header"><span class="prof-card-name">' + escapeHtml(a.name) + '</span><span class="toggle-arrow">&#9654;</span></div>';
        html += '<div class="prof-card-body">';
        if (a.proficiency) html += '<div class="prof-info"><span class="prof-label">Proficiency</span><span class="prof-val stat-positive">' + a.proficiency + '</span></div>';
        if (a.focus) html += '<div class="prof-info"><span class="prof-label">Focus</span><span class="prof-val stat-positive">' + a.focus + '</span></div>';
        if (a.commission) html += '<div class="prof-info"><span class="prof-label">Commission</span><span class="prof-val stat-positive">' + a.commission + '%</span></div>';
        if (a.speed) html += '<div class="prof-info"><span class="prof-label">Speed</span><span class="prof-val stat-positive">+' + a.speed + '%</span></div>';
        if (a.special) html += '<div class="prof-info"><span class="prof-label">Special</span><span class="prof-val" style="color:var(--highlight)">' + escapeHtml(a.special) + '</span></div>';
        html += '</div></div>';
      }
      document.getElementById("artisan-list").innerHTML = html || '<div class="empty-state">No artisans match</div>';
    }

    // ============================================================

    // ============================================================
    // TAB SWITCHING
    // ============================================================
    var tabs = document.querySelectorAll(".view-tab");
    var artisansControls = document.getElementById("artisans-controls");
    tabs.forEach(function(tab) {
      tab.addEventListener("click", function() {
        tabs.forEach(function(t) { t.classList.remove("active"); });
        tab.classList.add("active");
        document.querySelectorAll(".prof-view").forEach(function(v) { v.classList.remove("active"); });
        document.getElementById("view-" + tab.getAttribute("data-tab")).classList.add("active");
        artisansControls.style.display = tab.getAttribute("data-tab") === "artisans" ? "flex" : "none";
        if (tab.getAttribute("data-tab") === "masterwork") renderMasterwork();
        if (tab.getAttribute("data-tab") === "profit") renderProfit();
        if (tab.getAttribute("data-tab") === "workshop") renderWorkshop();
      });
    });

    // Click to expand artisan cards
    document.getElementById("artisan-list").addEventListener("click", function(e) {
      var card = e.target.closest(".prof-card");
      if (card) card.classList.toggle("open");
    });

    searchInput.addEventListener("input", renderArtisans);
    filterProf.addEventListener("change", renderArtisans);
    renderArtisans();

</body>
</html>
