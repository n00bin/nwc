<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mounts — Neverwinter Compendium</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .mount-icon { width: 64px; height: 64px; float: right; margin: 0 0 0.5rem 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--border-default); }
    .view-tab {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-bottom: none;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      color: var(--text-secondary);
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      font-family: var(--font-main);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .view-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .ranking-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
    }
    .ranking-card:hover { border-color: var(--border-accent); }
    .ranking-header {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--highlight);
      padding: 0.8rem 0 0.3rem;
      border-bottom: 1px solid var(--border-default);
      margin-bottom: 0.5rem;
    }
    .ranking-header:first-child { padding-top: 0; }
  </style>
</head>
<body>
  <nav class="navbar"></nav>

  <!-- View tabs -->
  <div class="controls-bar" style="gap:0.25rem;padding-bottom:0;">
    <button class="view-tab active" id="tab-lookup">Lookup</button>
    <button class="view-tab" id="tab-combat">Combat Power Ranking</button>
    <button class="view-tab" id="tab-stdps">DPS Combat Power Ranking</button>
    <button class="view-tab" id="tab-equip">Support Equip Bonuses</button>
  </div>

  <!-- Filters / Search (lookup view) -->
  <div class="controls-bar" id="lookup-controls">
    <input type="text" class="search-input" id="search" placeholder="Search mounts...">
    <select class="filter-select" id="filter-combat">
      <option value="">All Combat Powers</option>
    </select>
    <select class="filter-select" id="filter-equip">
      <option value="">All Equip Powers</option>
    </select>
    <select class="filter-select" id="filter-bonus">
      <option value="">All Insignia Bonuses</option>
    </select>
    <label style="display:flex;align-items:center;gap:0.4rem;color:var(--text-secondary);font-size:0.85rem;cursor:pointer;white-space:nowrap;">
      <input type="checkbox" id="toggle-preferred"> Preferred Slot
    </label>
  </div>

  <!-- Two-panel layout (lookup view) -->
  <div class="page-body" id="lookup-view">
    <div class="list-panel" id="list-panel">
      <div class="list-count" id="list-count"></div>
      <div id="mount-list"></div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">Select a mount to view details</div>
    </div>
  </div>

  <!-- Combat controls -->
  <div class="controls-bar" id="combat-controls" style="display:none;">
    <input type="text" class="search-input" id="combat-search" placeholder="Search combat powers...">
  </div>
  <div id="combat-view" style="display:none; max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem;">
    <div id="combat-list"></div>
  </div>

  <!-- DPS controls -->
  <div class="controls-bar" id="stdps-controls" style="display:none;">
    <input type="text" class="search-input" id="stdps-search" placeholder="Search DPS powers...">
  </div>
  <div id="stdps-view" style="display:none; max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem;">
    <div id="stdps-list"></div>
  </div>

  <!-- Equip controls -->
  <div class="controls-bar" id="equip-controls" style="display:none;">
    <input type="text" class="search-input" id="equip-search" placeholder="Search equip bonuses...">
  </div>
  <div id="equip-view" style="display:none; max-width:900px; margin:0 auto; padding:1rem 1.5rem 3rem;">
    <div id="equip-list"></div>
  </div>

  <!-- Data -->
  <script src="data/mounts.js"></script>
  <script src="data/mount-combat-powers.js"></script>
  <script src="data/mount-equip-powers.js"></script>
  <script src="data/mount-insignia-bonuses.js"></script>
  <script src="data/mount-insignias.js"></script>

  <script src="data/mount-images.js"></script>

  <!-- Scripts -->
  <script src="js/shared.js"></script>
  <script src="js/mounts-page.js"></script>
</body>
</html>
